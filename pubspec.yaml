name: emilie_app
description: Application éducative pour Emilie - CE1 & CE2
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Audio
  audioplayers: ^6.0.0

  # Animations
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  lottie: ^3.1.0
  rive: ^0.13.0

  # Storage
  shared_preferences: ^2.2.3

  # Speech recognition (dictée interactive)
  speech_to_text: ^6.5.0

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/sounds/music/
    - assets/images/
    - assets/animations/
    - assets/rive/
