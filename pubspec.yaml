name: emilie_app
description: Application éducative pour Emilie - CE1 & CE2
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Audio 🎵
  audioplayers: ^6.0.0          # Sons et musiques

  # Animations
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  lottie: ^3.1.0

  # Storage
  shared_preferences: ^2.2.3

  # Firebase (optionnel - pour sauvegarde cloud)
  # firebase_core: ^2.24.0
  # cloud_firestore: ^4.14.0
  # firebase_auth: ^4.16.0

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
    - assets/sounds/music/
    - assets/animations/
