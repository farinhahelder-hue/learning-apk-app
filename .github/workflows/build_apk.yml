name: 📦 Build APK Emilie App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # permet de lancer manuellement

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Installer Java 17 (requis par Flutter/Gradle)
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Installer Flutter stable
      - name: 💙 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 4. Vérifier l'installation
      - name: 🔍 Flutter doctor
        run: flutter doctor -v

      # 5. Créer les dossiers assets vides si absents
      - name: 📂 Create asset directories
        run: |
          mkdir -p assets/images
          mkdir -p assets/sounds/music
          mkdir -p assets/animations
          # Créer des fichiers placeholder pour que Flutter ne plante pas
          touch assets/sounds/.gitkeep
          touch assets/sounds/music/.gitkeep
          touch assets/images/.gitkeep
          touch assets/animations/.gitkeep

      # 6. Installer les dépendances
      - name: 📦 Flutter pub get
        run: flutter pub get

      # 7. Analyser le code
      - name: 🔎 Analyse code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # 8. Compiler l'APK release
      - name: 🔨 Build APK (release)
        run: flutter build apk --release --no-shrink

      # 9. Compiler aussi un APK debug (plus rapide à installer pour test)
      - name: 🔧 Build APK (debug)
        run: flutter build apk --debug

      # 10. Publier les APK comme artefacts téléchargeables
      - name: 📤 Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: emilie-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 📤 Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: emilie-app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # 11. Afficher la taille du fichier APK
      - name: 📊 APK info
        run: |
          echo "=== APK Release ==="
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          echo "=== APK Debug ==="
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
