name: 📦 Build APK Emilie App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 💙 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: 📂 Create asset placeholder files
        run: |
          mkdir -p assets/images assets/sounds/music assets/animations
          touch assets/sounds/.gitkeep
          touch assets/sounds/music/.gitkeep
          touch assets/images/.gitkeep
          touch assets/animations/.gitkeep

      - name: 📦 Flutter pub get
        run: flutter pub get

      - name: 🔨 Build APK release
        run: flutter build apk --release

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: emilie-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 📊 APK size
        run: ls -lh build/app/outputs/flutter-apk/app-release.apk
