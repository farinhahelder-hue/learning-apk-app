name: 🚀 Release APK avec tag

on:
  push:
    tags:
      - 'v*'   # déclenché par un tag comme v1.0.0, v2.0.0...

jobs:
  release:
    name: Create GitHub Release with APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 💙 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📂 Create asset directories
        run: |
          mkdir -p assets/images assets/sounds/music assets/animations
          touch assets/sounds/.gitkeep assets/sounds/music/.gitkeep
          touch assets/images/.gitkeep assets/animations/.gitkeep

      - name: 📦 Flutter pub get
        run: flutter pub get

      - name: 🔨 Build APK Release
        run: flutter build apk --release --no-shrink

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Emilie App ${{ github.ref_name }}"
          body: |
            ## 🌈 Emilie App ${{ github.ref_name }}
            
            ### 📥 Télécharger l'APK
            Clique sur **emilie-app-release.apk** ci-dessous pour télécharger.
            
            ### 📲 Installation sur Android
            1. Télécharge le fichier APK
            2. Autorise les sources inconnues dans les paramètres Android
            3. Ouvre le fichier APK et installe
            4. Lance **Emilie App** 🎉
            
            ### 🆕 Nouveautés
            - Programme CE1 + CE2 complet
            - 7 mondes gamifiés
            - Aventure narrative (6 chapitres)
            - Pause active anti-sedentarité
            - Coach Stella bienveillant
            - Sons & musiques
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
