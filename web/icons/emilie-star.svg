<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF6B9D"/>
    </linearGradient>
    <linearGradient id="cheekGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB3C6"/>
      <stop offset="100%" style="stop-color:#FF8FAB"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Star body -->
  <g transform="translate(100,100)">
    <path d="M0,-80 L18,-30 L72,-30 L28,8 L44,58 L0,28 L-44,58 L-28,8 L-72,-30 L-18,-30 Z"
          fill="url(#starGrad)" stroke="#FF4081" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="12s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Eyes -->
  <g>
    <circle cx="72" cy="78" r="9" fill="#333"/>
    <circle cx="128" cy="78" r="9" fill="#333"/>
    <circle cx="75" cy="75" r="3" fill="white"/>
    <circle cx="131" cy="75" r="3" fill="white"/>
  </g>
  <!-- Cheeks -->
  <ellipse cx="62" cy="100" rx="14" ry="10" fill="url(#cheekGrad)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.4;0.7" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="138" cy="100" rx="14" ry="10" fill="url(#cheekGrad)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.4;0.7" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Smile -->
  <path d="M82,112 Q100,130 118,112" fill="none" stroke="#E65100" stroke-width="3" stroke-linecap="round"/>
  <!-- Sparkles -->
  <g filter="url(#glow)">
    <text x="35" y="45" font-size="16" fill="#FFD700">
      ✦
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </text>
    <text x="145" y="55" font-size="12" fill="#FFD700">
      ✦
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" begin="0.5s"/>
    </text>
    <text x="50" y="150" font-size="10" fill="#FFD700">
      ✦
      <animate attributeName="opacity" values="1;0.3;1" dur="1.3s" repeatCount="indefinite" begin="1s"/>
    </text>
    <text x="155" y="140" font-size="14" fill="#FFD700">
      ✦
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite" begin="0.3s"/>
    </text>
  </g>
</svg>
